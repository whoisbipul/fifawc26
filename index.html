<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × Himalaya TV | Scope of Work 2026</title>
    
    <!-- Montserrat: Clean & Strong -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind & Framer Motion -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6',
                            pink: '#ec4899',
                            magenta: '#d946ef',
                            red: '#ef4444',
                            deep: '#030305'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #030305; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Mesh Gradient Background */
        .gradient-sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .heading-xl { font-weight: 900; line-height: 0.85; letter-spacing: -0.05em; text-transform: uppercase; }
        .heading-lg { font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; }
        
        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bento-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #ec4899;
            transform: scale(1.01);
        }

        .text-gradient {
            background: linear-gradient(to right, #8b5cf6, #ec4899, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #ec4899;
            transition: width .3s;
        }
        .nav-link:hover::after { width: 100%; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const App = () => {
            const [selected, setSelected] = useState(null);

            const ownershipData = [
                { id: 1, title: "Platform Management", emoji: "⚡", size: "md:col-span-2", 
                  content: "Full ownership of the digital broadcasting ecosystem and OTT streaming infrastructure. Includes delivery of high-quality live streaming across multiple devices and network conditions, optimized for adaptive performance." },
                { id: 2, title: "Subscription & Revenue", emoji: "💸", size: "md:col-span-1",
                  content: "Direct management of pricing, bundling strategies, and promotional offers. Integrating all payment channels including wallets and telecom operators with real-time revenue tracking." },
                { id: 3, title: "Digital Product Differentiation", emoji: "🎨", size: "md:col-span-1",
                  content: "Exclusive DGO localized commentary. Implementation of multi-feed or dual-audio capabilities and fan-driven engagement formats like watch-along experiences." },
                { id: 4, title: "Content Production", emoji: "🎞️", size: "md:col-span-2",
                  content: "Lead creation of digital-first formats: match highlights (DGO Exclusive), behind-the-scenes coverage, and platform-native storytelling designed for online consumption." },
                { id: 5, title: "Brand Partnerships", emoji: "🤝", size: "md:col-span-2",
                  content: "Leading monetization initiatives with a focus on B2B subscriber acquisition and strategic models across telecoms, ISPs, and digital wallets for large-scale integration." },
                { id: 6, title: "Customer Acquisition", emoji: "🎯", size: "md:col-span-1",
                  content: "Full ownership of the digital marketing funnel and performance marketing. Exclusive launch of the 'Early Bird Season Pass' through the DGO platform." },
                { id: 7, title: "Technical Readiness", emoji: "🛡️", size: "md:col-span-3",
                  content: "Platform stability and scalability for peak traffic scenarios. Real-time monitoring of uptime, proactive issue detection, and structured incident response mechanisms." }
            ];

            return (
                <div className="relative">
                    {/* Background Visuals */}
                    <div className="gradient-sphere bg-dgo-purple w-[600px] h-[600px] top-[-20%] left-[-10%]" />
                    <div className="gradient-sphere bg-dgo-pink w-[500px] h-[500px] bottom-[-10%] right-[-10%]" />
                    <div className="gradient-sphere bg-dgo-red w-[400px] h-[400px] top-[40%] left-[40%]" />

                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center bg-dgo-deep/80 backdrop-blur-xl border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <img src="logo.png" alt="DGO" className="h-10 w-auto object-contain" />
                            <div className="h-6 w-px bg-white/20 mx-2" />
                            <span className="heading-lg text-lg tracking-tighter">Himalaya TV</span>
                        </div>
                        <div className="hidden md:flex gap-10 font-bold text-[10px] uppercase tracking-[0.4em]">
                            <a href="#principles" className="nav-link text-gray-400 hover:text-white transition-all">Principles</a>
                            <a href="#dgo" className="nav-link text-gray-400 hover:text-white transition-all">Ownership</a>
                            <a href="#joint" className="nav-link text-gray-400 hover:text-white transition-all">Joint Ops</a>
                            <a href="#governance" className="nav-link text-gray-400 hover:text-white transition-all">Governance</a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="min-h-screen flex flex-col justify-center px-8 md:px-20 pt-20">
                        <motion.div 
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1 }}
                            className="max-w-6xl"
                        >
                            <img src="logo.png" alt="Logo" className="h-24 md:h-32 mb-10 opacity-90 drop-shadow-[0_0_20px_rgba(236,72,153,0.3)]" />
                            <h1 className="heading-xl text-[4.5rem] md:text-[9rem] mb-6">
                                <span className="block text-white">Scope of</span>
                                <span className="text-gradient block">Work</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-start md:items-center gap-6 mt-10">
                                <div className="px-6 py-2 border border-dgo-pink text-dgo-pink text-[10px] font-black uppercase tracking-[0.5em] rounded-full">
                                    FIFA World Cup 2026 — Nepal Market
                                </div>
                                <p className="text-gray-400 text-lg md:text-xl font-light uppercase tracking-widest leading-none">
                                    Strategic Executive Framework
                                </p>
                            </div>
                        </motion.div>
                    </section>

                    {/* Guiding Principles */}
                    <section id="principles" className="py-40 px-8 md:px-20 border-t border-white/5">
                        <div className="grid lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="heading-lg text-4xl mb-8">01. Guiding <span className="text-gradient">Principles</span></h2>
                                <p className="text-gray-400 text-lg leading-relaxed font-light mb-10">
                                    This engagement shall operate as a joint partnership, with clearly aligned commercial objectives 
                                    and success metrics across both parties.
                                </p>
                            </div>
                            <div className="space-y-12">
                                {[
                                    { t: "ONE PRODUCT, DUAL PLATFORM", d: "Execution anchored on a framework where Himalaya TV leads linear broadcast while DGO drives the digital streaming ecosystem." },
                                    { t: "JOINT ACCOUNTABILITY", d: "Both parties remain jointly accountable for overall revenue performance, audience growth, and market impact." },
                                    { t: "ACTIVE COLLABORATION", d: "A spirit of mutual respect, ensuring all key ideas and execution plans are openly discussed prior to implementation." }
                                ].map((item, i) => (
                                    <motion.div 
                                        key={i}
                                        whileInView={{ opacity: 1, x: 0 }}
                                        initial={{ opacity: 0, x: 20 }}
                                        className="border-l-4 border-dgo-pink pl-8 py-2"
                                    >
                                        <h4 className="heading-lg text-lg mb-2">{item.t}</h4>
                                        <p className="text-gray-500 text-sm">{item.d}</p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* DGO Core Ownership Bento Grid */}
                    <section id="dgo" className="py-40 px-8 md:px-20 bg-white/[0.01]">
                        <div className="mb-20 flex justify-between items-end">
                            <div>
                                <h2 className="heading-lg text-5xl mb-4">02. DGO <span className="text-gradient">Core Ownership</span></h2>
                                <p className="text-gray-500 text-xs font-bold uppercase tracking-[0.4em]">Section 2.0 Scope of Work Detail</p>
                            </div>
                            <div className="text-[10px] font-black text-dgo-pink animate-pulse hidden md:block tracking-widest">CLICK FOR DETAIL</div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            {ownershipData.map((item) => (
                                <motion.div 
                                    key={item.id}
                                    layout
                                    onClick={() => setSelected(selected === item.id ? null : item.id)}
                                    className={`bento-card p-10 rounded-[2.5rem] cursor-pointer relative overflow-hidden group ${item.size} ${selected === item.id ? 'border-dgo-pink bg-white/5 shadow-[0_0_40px_rgba(236,72,153,0.15)]' : ''}`}
                                >
                                    <div className="flex justify-between items-start mb-12">
                                        <span className="text-4xl grayscale group-hover:grayscale-0 transition-all">{item.emoji}</span>
                                        <div className={`w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-xs font-black transition-all ${selected === item.id ? 'bg-dgo-pink rotate-45' : ''}`}>+</div>
                                    </div>
                                    <h3 className="heading-lg text-2xl mb-4 leading-none">{item.title}</h3>
                                    
                                    <AnimatePresence>
                                        {selected === item.id ? (
                                            <motion.p 
                                                initial={{ opacity: 0, height: 0 }}
                                                animate={{ opacity: 1, height: "auto" }}
                                                exit={{ opacity: 0, height: 0 }}
                                                className="text-gray-300 text-sm leading-relaxed mt-4"
                                            >
                                                {item.content}
                                            </motion.p>
                                        ) : (
                                            <p className="text-gray-500 text-xs uppercase tracking-widest opacity-50">View Details</p>
                                        )}
                                    </AnimatePresence>
                                </motion.div>
                            ))}
                        </div>
                    </section>

                    {/* Joint Responsibility Section */}
                    <section id="joint" className="py-40 px-8 md:px-20">
                        <div className="grid lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-8 order-2 lg:order-1">
                                <h2 className="heading-lg text-4xl">03. Joint <span className="text-gradient">Responsibility</span></h2>
                                <div className="space-y-4">
                                    {[
                                        "Compliance with FIFA Brand Guidelines",
                                        "Co-created Match Day Flagship Shows",
                                        "Press Meet and Official Launch Events",
                                        "Shared War Room and Live Operations",
                                        "Crisis and Incident Communications",
                                        "Major Cross-Platform Partner Integrations"
                                    ].map((text, i) => (
                                        <div key={i} className="flex items-center gap-6 p-6 bento-card rounded-2xl group hover:pl-10 transition-all">
                                            <div className="w-2 h-2 rounded-full bg-dgo-red shadow-[0_0_10px_#ef4444]" />
                                            <span className="heading-lg text-[11px] tracking-[0.2em]">{text}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="order-1 lg:order-2">
                                <div className="p-16 bento-card rounded-[4rem] border-dgo-red/20 bg-dgo-red/[0.03]">
                                    <h4 className="heading-lg text-dgo-red text-2xl mb-8 tracking-tighter italic">Himalaya TV Specifics 📡</h4>
                                    <p className="text-gray-400 text-sm leading-loose font-light">
                                        Primarily leading the linear broadcast execution, ensuring high-quality 
                                        television coverage and nationwide reach. Acting as a critical 
                                        <strong> top-of-funnel driver</strong> for the overall ecosystem 
                                        through linear inventory and mass awareness.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Governance */}
                    <section id="governance" className="py-40 px-8 md:px-20 bg-white/[0.01]">
                        <div className="max-w-4xl mx-auto text-center mb-20">
                            <h2 className="heading-lg text-5xl mb-6 uppercase tracking-tighter">Governance <span className="text-gradient">& Reporting</span></h2>
                        </div>
                        <div className="grid md:grid-cols-2 gap-10">
                            <div className="p-12 bento-card rounded-[3rem] text-center">
                                <h5 className="heading-lg text-4xl mb-4 text-dgo-pink">WEEKLY</h5>
                                <p className="text-gray-400 text-sm font-light">Review cadence covering revenue performance, subscriber growth, and strategic alignment.</p>
                            </div>
                            <div className="p-12 bento-card rounded-[3rem] text-center">
                                <h5 className="heading-lg text-4xl mb-4 text-dgo-pink">DAILY</h5>
                                <p className="text-gray-400 text-sm font-light">Operational reporting tracking platform performance, incident logs, and execution status.</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer / Call to Action */}
                    <footer className="py-60 px-8 text-center relative">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="heading-xl text-[4rem] md:text-[6rem] mb-12">
                                UNIFIED <span className="text-gradient">SUCCESS</span>
                            </h2>
                            <p className="text-gray-500 uppercase tracking-[0.8em] text-[10px] font-black mb-16">
                                Nepal's Premium Broadcast Future
                            </p>
                            <div className="flex justify-center items-center gap-10 grayscale hover:grayscale-0 transition-all">
                                <img src="logo.png" alt="DGO" className="h-10 opacity-50" />
                                <div className="w-px h-6 bg-white/20" />
                                <span className="heading-lg text-sm text-gray-500 tracking-[0.3em]">Himalaya TV</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
