<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × Himalaya TV | FIFA 2026</title>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            dark: '#0a0a0c', card: '#16161d'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: 'Montserrat', sans-serif; margin: 0; }
        .gradient-bg { background: linear-gradient(to right, #8b5cf6, #ec4899, #ef4444); }
        /* Hide content until React loads */
        #root:empty { display: none; }
    </style>
</head>
<body>
    <!-- Fallback if JS fails -->
    <div id="loading-fallback" style="color: white; text-align: center; margin-top: 50px;">
        <p>Loading Executive Presentation...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple components that don't need external animation libraries to be safe
        const GradientText = ({ children }) => (
            <span className="bg-clip-text text-transparent bg-gradient-to-r from-[#8b5cf6] via-[#ec4899] to-[#ef4444]">
                {children}
            </span>
        );

        const App = () => {
            useEffect(() => {
                // Hide fallback once loaded
                document.getElementById('loading-fallback').style.display = 'none';
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Header Nav */}
                    <nav className="fixed top-0 w-full z-50 bg-dgo-dark/80 backdrop-blur-md border-b border-white/10 py-4 px-8 flex justify-between items-center">
                        <div className="font-extrabold text-xl tracking-tighter">DGO <span className="font-light text-gray-500">×</span> HIMATV</div>
                        <div className="text-[10px] uppercase tracking-widest text-dgo-pink font-bold">FIFA World Cup 2026</div>
                    </nav>

                    {/* Hero Section */}
                    <section className="h-screen flex flex-col justify-center items-center px-6 text-center relative">
                        <div className="absolute w-[500px] h-[500px] bg-dgo-purple/10 blur-[120px] rounded-full" />
                        <div className="relative z-10">
                            <div className="inline-block py-1 px-4 border border-dgo-pink/30 rounded-full mb-6 bg-dgo-pink/5">
                                <span className="text-[10px] font-bold tracking-[0.3em] uppercase text-dgo-pink">Strategy Framework</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-extrabold mb-6 tracking-tighter leading-tight">
                                <GradientText>DGO × Himalaya TV</GradientText><br/>
                                <span className="text-white">Scope of Work</span>
                            </h1>
                            <p className="text-gray-400 text-lg max-w-xl mx-auto font-light leading-relaxed">
                                A unified "One Product, Dual Platform" partnership for the 
                                FIFA World Cup 2026 in Nepal.
                            </p>
                        </div>
                    </section>

                    {/* DGO Core Areas */}
                    <section className="py-24 px-8 max-w-6xl mx-auto">
                        <h2 className="text-3xl font-bold mb-16 text-center italic tracking-tight">DGO Core <GradientText>Ownership</GradientText></h2>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {[
                                { t: "OTT Management", p: ["Full digital ecosystem ownership", "Adaptive streaming optimization", "Real-time uptime monitoring"] },
                                { t: "Subscription & Revenue", p: ["Pricing & bundling strategies", "Payment gateway management", "Real-time revenue tracking"] },
                                { t: "Digital Innovation", p: ["Localized commentary (Exclusive)", "Multi-feed/Dual-audio capabilities", "Interactive watch-alongs"] },
                                { t: "Content Production", p: ["Digital-first match highlights", "Behind-the-scenes coverage", "Short-form social content"] },
                                { t: "Customer Acquisition", p: ["Performance marketing leadership", "Early Bird Season Pass rollout", "Corporate bundling initiatives"] },
                                { t: "Tech Readiness", p: ["High-traffic peak scaling", "Third-party integrations", "Robust redundancy systems"] }
                            ].map((item, idx) => (
                                <div key={idx} className="bg-dgo-card border border-white/5 p-8 rounded-2xl hover:border-dgo-pink/30 transition-all">
                                    <h3 className="text-lg font-bold mb-4 text-white uppercase">{item.t}</h3>
                                    <ul className="space-y-3">
                                        {item.p.map((point, i) => (
                                            <li key={i} className="text-gray-400 text-xs flex gap-2">
                                                <span className="text-dgo-red">•</span> {point}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Joint Section */}
                    <section className="py-24 px-8 bg-white/5 border-y border-white/5">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-bold italic mb-4">Joint <GradientText>Responsibility</GradientText></h2>
                                <p className="text-gray-500 text-sm italic">Agreed Collaborative Workstreams</p>
                            </div>
                            <div className="grid md:grid-cols-2 gap-4">
                                {[
                                    "FIFA Brand Compliance & Governance",
                                    "Official Press Meet & Launch Events",
                                    "Shared War Room & Live Ops Management",
                                    "Crisis & Incident Communication",
                                    "Integrated Marketing Campaigns",
                                    "Cross-Platform Partner Integrations"
                                ].map((text, i) => (
                                    <div key={i} className="p-5 bg-dgo-dark rounded-xl border border-white/10 flex items-center gap-4 group hover:border-dgo-pink/50 transition-all">
                                        <div className="w-2 h-2 rounded-full bg-dgo-pink" />
                                        <span className="text-sm font-semibold">{text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Himalaya Section */}
                    <section className="py-32 px-8 text-center bg-gradient-to-b from-transparent to-dgo-red/5">
                        <h2 className="text-4xl font-bold mb-6 tracking-tighter text-white">Himalaya TV</h2>
                        <div className="max-w-2xl mx-auto space-y-6">
                            <p className="text-xl text-dgo-red font-semibold">Linear Broadcast Leadership</p>
                            <p className="text-gray-400 leading-relaxed font-light">
                                Providing nationwide television reach and acting as the 
                                <strong> primary top-of-funnel driver</strong>. Managing linear inventory 
                                and contributing to integrated sponsorship opportunities.
                            </p>
                        </div>
                    </section>

                    {/* Closing */}
                    <footer className="py-32 px-8 text-center border-t border-white/5">
                        <div className="max-w-3xl mx-auto bg-dgo-card p-12 rounded-[2rem] border border-white/10">
                            <h2 className="text-3xl font-bold mb-6 italic leading-snug">
                                A unified broadcast ecosystem, built on <br/>
                                <GradientText>collaboration and commercial ambition.</GradientText>
                            </h2>
                            <div className="h-px w-20 bg-dgo-pink mx-auto mb-6" />
                            <p className="text-[10px] tracking-[0.6em] uppercase text-gray-500 font-bold">Official Presentation 2026</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
