<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × Himalaya TV | Executive Presentation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            bg: '#08090d', card: '#11131a', border: 'rgba(255,255,255,0.08)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #08090d; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Mesh Gradient Background - No more "shit black" */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
        }

        .bento-card {
            background: rgba(17, 19, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            border-color: #ec4899;
            transform: scale(1.02);
            background: rgba(25, 28, 38, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(236, 72, 153, 0.1);
        }

        .bento-card.active {
            border-color: #ec4899;
            background: rgba(30, 34, 46, 0.9);
            grid-row: span 2;
        }

        .text-gradient {
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .heading-strong { font-weight: 900; letter-spacing: -0.04em; text-transform: uppercase; }

        /* Animation for logos and cards */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selected, setSelected] = useState(null);

            const dgoOwnership = [
                { id: 1, title: "Platform Management", emoji: "🌐", size: "col-span-2", 
                  detail: "DGO assumes full ownership of the digital broadcasting ecosystem and OTT streaming infrastructure. This ensures high-quality live streaming optimized for adaptive performance across all network conditions and bandwidths." },
                { id: 2, title: "Subscription & Revenue", emoji: "💰", size: "col-span-1",
                  detail: "Full control over pricing, bundling strategies, and promotional offers. Management of all payment channels including digital wallets, telecom operators, and real-time revenue tracking frameworks." },
                { id: 3, title: "Brand Partnerships", emoji: "🤝", size: "col-span-1",
                  detail: "Leading all monetization initiatives with a primary focus on B2B subscriber acquisition. Creating strategic partnership models for Telecoms, ISPs, and Digital Wallets." },
                { id: 4, title: "Exclusive Digital Features", emoji: "✨", size: "col-span-2",
                  detail: "Introduction of Localized Commentary exclusively for DGO users. Implementing multi-feed views, dual-audio capabilities, and interactive fan engagement formats like watch-alongs." },
                { id: 5, title: "Content Production", emoji: "🎬", size: "col-span-1",
                  detail: "Lead creation of digital-first formats. This includes exclusive match highlights, behind-the-scenes coverage, and platform-native storytelling designed for online consumption." },
                { id: 6, title: "Customer Acquisition", emoji: "🚀", size: "col-span-2",
                  detail: "Ownership of the performance marketing funnel. Deployment of the 'Early Bird Season Pass' as the primary transaction point through the DGO platform." },
                { id: 7, title: "Technical Readiness", emoji: "🛡️", size: "col-span-3",
                  detail: "Ensuring scalability for peak traffic scenarios, payment gateway stability, and structured incident response mechanisms for uninterrupted service during the tournament window." }
            ];

            return (
                <div className="relative pb-40">
                    <div className="mesh-bg" />

                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-[100] px-10 py-6 flex justify-between items-center backdrop-blur-md bg-dgo-bg/60 border-b border-white/5">
                        <div className="flex items-center gap-4">
                            <img src="logo.png" alt="DGO" className="h-10 w-auto" onError={(e) => e.target.style.display='none'} />
                            <div className="h-8 w-[2px] bg-white/10 mx-2" />
                            <span className="heading-strong text-xl tracking-tighter">Himalaya TV</span>
                        </div>
                        <div className="heading-strong text-[10px] tracking-[0.4em] text-gray-500 hidden md:block">FIFA WORLD CUP 2026 STRATEGY</div>
                    </nav>

                    {/* Hero */}
                    <header className="min-h-screen flex flex-col justify-center items-center px-6 pt-20 text-center">
                        <div className="float mb-10">
                            <img src="logo.png" className="h-32 w-auto mb-4" alt="DGO Logo" onError={(e) => { e.target.src='https://via.placeholder.com/200x100?text=DGO+LOGO'; }} />
                        </div>
                        <h1 className="heading-strong text-6xl md:text-9xl mb-6">
                            One Product<br />
                            <span className="text-gradient">Dual Platform</span>
                        </h1>
                        <p className="text-xl text-gray-400 max-w-2xl font-light tracking-wide uppercase">
                            Joint Partnership Framework for <span className="text-white font-bold">FIFA 2026 — Nepal</span>
                        </p>
                    </header>

                    {/* Guiding Principles */}
                    <section className="px-10 py-32 max-w-7xl mx-auto">
                        <h2 className="heading-strong text-4xl mb-16 text-center">01. Guiding Principles 🏛️</h2>
                        <div className="grid md:grid-cols-3 gap-6">
                            {[
                                { t: "Joint Partnership", d: "Aligned commercial objectives and success metrics across both parties." },
                                { t: "Revenue Potential", d: "Maximizing total revenue while ensuring full FIFA rights compliance." },
                                { t: "Seamless Experience", d: "A unified broadcast ecosystem protecting overall consumer value." }
                            ].map((p, i) => (
                                <div key={i} className="bento-card">
                                    <h4 className="heading-strong text-lg mb-4 text-dgo-pink">{p.t}</h4>
                                    <p className="text-gray-400 text-sm leading-relaxed">{p.d}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* DGO Bento Grid */}
                    <section className="px-10 py-32 max-w-7xl mx-auto">
                        <div className="flex justify-between items-end mb-16">
                            <div>
                                <h2 className="heading-strong text-5xl mb-4">02. DGO Ownership 🕹️</h2>
                                <p className="text-gray-500 uppercase tracking-widest text-xs font-bold">Digital-First Ecosystem Management</p>
                            </div>
                            <span className="text-xs text-gray-600 hidden md:block">CLICK CARDS FOR DETAILS</span>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6 auto-rows-auto">
                            {dgoOwnership.map((item) => (
                                <div 
                                    key={item.id} 
                                    className={`bento-card ${item.size} ${selected === item.id ? 'active border-dgo-pink bg-dgo-card' : ''}`}
                                    onClick={() => setSelected(selected === item.id ? null : item.id)}
                                >
                                    <div className="flex justify-between items-start mb-6">
                                        <span className="text-4xl">{item.emoji}</span>
                                        <div className="bg-white/5 p-2 rounded-lg group-hover:bg-dgo-pink/20 transition-colors">
                                            <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                        </div>
                                    </div>
                                    <h3 className="heading-strong text-xl mb-4 leading-tight">{item.title}</h3>
                                    <p className={`text-gray-400 text-sm leading-relaxed ${selected === item.id ? 'block' : 'line-clamp-2 opacity-60'}`}>
                                        {item.detail}
                                    </p>
                                    {selected === item.id && (
                                        <div className="mt-6 pt-6 border-t border-white/5 flex gap-2">
                                            <div className="px-3 py-1 rounded-full bg-dgo-pink/20 text-dgo-pink text-[10px] font-bold">EXECUTIVE FOCUS</div>
                                            <div className="px-3 py-1 rounded-full bg-white/5 text-gray-400 text-[10px] font-bold tracking-widest">DGO LEAD</div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Joint Operations */}
                    <section className="px-10 py-32 bg-dgo-card/40 border-y border-white/5">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="heading-strong text-4xl mb-16">03. Joint Operations ⚙️</h2>
                            <div className="grid md:grid-cols-2 gap-10">
                                <div className="space-y-6">
                                    {[
                                        "FIFA Compliance & Governance Alignment",
                                        "Co-created Match Day Flagship Shows",
                                        "Shared War Room and Live Operations Structure",
                                        "Press Meet and Official Launch Events",
                                        "Crisis and Incident Communication Protocols"
                                    ].map((text, i) => (
                                        <div key={i} className="flex gap-6 items-center p-6 glass-card rounded-2xl border border-white/5 group hover:border-dgo-pink/40 transition-all">
                                            <div className="w-3 h-3 rounded-full bg-dgo-pink group-hover:scale-150 transition-transform" />
                                            <span className="heading-strong text-sm tracking-wide">{text}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-12 bento-card border-dgo-red/20 bg-dgo-red/5">
                                    <h3 className="heading-strong text-3xl mb-8 text-dgo-red tracking-tighter">Himalaya TV Support 📡</h3>
                                    <ul className="space-y-6 text-gray-400">
                                        <li className="flex gap-4">
                                            <span className="text-dgo-red font-bold">01.</span>
                                            <span>Linear broadcast leadership and nationwide reach management.</span>
                                        </li>
                                        <li className="flex gap-4">
                                            <span className="text-dgo-red font-bold">02.</span>
                                            <span>Driving mass top-of-funnel awareness for the ecosystem.</span>
                                        </li>
                                        <li className="flex gap-4">
                                            <span className="text-dgo-red font-bold">03.</span>
                                            <span>Participation in joint content initiatives and marketing campaigns.</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Governance */}
                    <section className="px-10 py-32 max-w-5xl mx-auto text-center">
                        <h2 className="heading-strong text-4xl mb-8">04. Governance 📊</h2>
                        <div className="bento-card grid md:grid-cols-2 gap-10 p-20">
                            <div>
                                <div className="heading-strong text-5xl mb-2">WEEKLY</div>
                                <div className="text-dgo-pink heading-strong text-xs tracking-widest mb-4">Strategic Reviews</div>
                                <p className="text-gray-500 text-sm">Revenue performance, subscriber growth, and marketing effectiveness alignment.</p>
                            </div>
                            <div className="border-l border-white/10 hidden md:block" />
                            <div>
                                <div className="heading-strong text-5xl mb-2">DAILY</div>
                                <div className="text-dgo-pink heading-strong text-xs tracking-widest mb-4">Operational War Room</div>
                                <p className="text-gray-500 text-sm">Real-time platform performance tracking and incident resolution logs.</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-40 text-center relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[400px] bg-dgo-pink/10 blur-[120px] rounded-full" />
                        <h2 className="heading-strong text-5xl md:text-7xl mb-12 relative z-10">
                            Shared Ambition.<br />
                            <span className="text-gradient">Universal Impact.</span>
                        </h2>
                        <div className="flex justify-center items-center gap-10 opacity-30">
                            <img src="logo.png" className="h-8" alt="DGO" />
                            <div className="w-[1px] h-4 bg-white" />
                            <span className="heading-strong text-sm tracking-widest">HIMALAYA TV</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
