<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × HIMALAYA | SCOPE OF WORK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            canvas: '#030305'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030305; color: #ffffff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; margin: 0; }

        /* KINETIC LIQUID BACKGROUND */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; background: #030305;
        }
        .blob {
            position: absolute; width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--color) 0%, transparent 70%);
            mix-blend-mode: screen; opacity: 0.12;
            animation: move-blob 20s infinite alternate ease-in-out;
        }
        @keyframes move-blob {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.1); }
        }

        /* TYPOGRAPHY */
        .h-mega { font-weight: 900; letter-spacing: -0.06em; text-transform: uppercase; line-height: 0.85; }
        .h-strong { font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; }
        .text-grad { 
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #ef4444); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* BENTO SYSTEM */
        .bento {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: #ec4899;
            transform: translateY(-5px);
        }

        /* ANIMATION HOOKS */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* RESPONSIVE SCALING */
        @media (max-width: 768px) {
            .h-mega { font-size: 3.5rem !important; line-height: 1; }
            .blob { width: 100vw; height: 100vw; }
        }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob" style="--color: #8b5cf6; top: -10%; left: -10%;"></div>
        <div class="blob" style="--color: #ef4444; bottom: -10%; right: -10%; animation-delay: -5s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="relative w-full overflow-x-hidden">
                    {/* RESPONSIVE NAVBAR */}
                    <nav className="fixed top-0 w-full z-[100] px-6 md:px-12 py-6 flex justify-between items-center backdrop-blur-2xl border-b border-white/5">
                        <div className="flex items-center gap-3 md:gap-6">
                            <img src="logo1.png" className="h-6 md:h-10 w-auto" alt="DGO" />
                            <div className="w-px h-5 bg-white/20"></div>
                            <img src="logo2.png" className="h-6 md:h-10 w-auto" alt="Himalaya" />
                        </div>
                        <div className="hidden lg:flex gap-10 font-bold text-[10px] uppercase tracking-[0.4em] text-gray-400">
                            <a href="#principles" className="hover:text-dgo-pink transition-all">Principles</a>
                            <a href="#ownership" className="hover:text-dgo-pink transition-all">Ownership</a>
                            <a href="#joint" className="hover:text-dgo-pink transition-all">Joint Ops</a>
                            <a href="#governance" className="hover:text-dgo-pink transition-all">Reporting</a>
                        </div>
                    </nav>

                    {/* HERO */}
                    <header className="min-h-screen flex flex-col justify-center px-6 md:px-24">
                        <div className="reveal max-w-7xl">
                            <h1 className="h-mega text-6xl md:text-[11rem]">
                                <span className="block text-white">SCOPE OF</span>
                                <span className="block text-grad">WORK</span>
                            </h1>
                            <div className="flex items-center gap-6 md:gap-12 mt-12 md:mt-20">
                                <div className="h-px w-12 md:w-32 bg-dgo-pink"></div>
                                <p className="text-gray-400 text-sm md:text-3xl font-light uppercase tracking-[0.3em] leading-tight">
                                    FIFA 2026 — <span className="text-white font-black">NEPAL MARKET</span>
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* 01. PRINCIPLES */}
                    <section id="principles" className="py-32 md:py-60 px-6 md:px-24 border-t border-white/5 reveal">
                        <div className="grid lg:grid-cols-12 gap-12 md:gap-20">
                            <div className="lg:col-span-5">
                                <h2 className="h-strong text-4xl md:text-6xl mb-8 leading-none">01.<br /><span className="text-grad">Principles</span></h2>
                                <p className="text-gray-400 text-lg font-light leading-relaxed mb-10">Clearly aligned objectives across the <strong className="text-white">One Product, Dual Platform</strong> ecosystem.</p>
                            </div>
                            <div className="lg:col-span-7 grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[
                                    { t: "Commercial Alignment", d: "Aligned objectives and success metrics to ensure total revenue potential." },
                                    { t: "Joint Accountability", d: "Jointly accountable for growth, revenue performance, and market impact." },
                                    { t: "FIFA Compliance", d: "Strict adherence to FIFA rights, brand guidelines, and governance standards." },
                                    { t: "Synergy", d: "Avoiding overlap or conflict in campaigns to protect ecosystem value." }
                                ].map((item, i) => (
                                    <div key={i} className="p-8 bento rounded-[2rem]">
                                        <h4 className="h-strong text-xs text-dgo-pink mb-4 tracking-widest">{item.t}</h4>
                                        <p className="text-gray-400 text-[11px] leading-relaxed font-bold uppercase tracking-wide">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 02. DGO BENTO GRID */}
                    <section id="ownership" className="py-32 md:py-60 px-6 md:px-24 bg-white/[0.01]">
                        <div className="mb-20 reveal">
                            <h2 className="h-strong text-4xl md:text-7xl mb-4">DGO <span className="text-grad">Scope</span></h2>
                            <p className="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold">Detailed Digital Ownership</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-6 gap-6 reveal">
                            {/* Broadast Lead */}
                            <div className="bento md:col-span-4 p-8 md:p-16 rounded-[3rem] border-dgo-pink/20">
                                <span className="text-3xl mb-8 block">🌐</span>
                                <h3 className="h-strong text-2xl md:text-4xl mb-6 leading-tight">Digital Broadcasting</h3>
                                <p className="text-gray-400 text-sm md:text-lg leading-relaxed font-light">
                                    Full ownership of the digital broadcasting ecosystem and OTT streaming infrastructure. 
                                    Adaptive streaming performance optimized for consistent viewing quality across all 
                                    bandwidth environments.
                                </p>
                            </div>

                            {/* Revenue */}
                            <div className="bento md:col-span-2 p-8 md:p-12 rounded-[3rem]">
                                <span className="text-3xl mb-8 block">💰</span>
                                <h3 className="h-strong text-xl mb-4 uppercase">Revenue Management</h3>
                                <p className="text-gray-500 text-[10px] leading-relaxed font-bold uppercase tracking-widest">
                                    Full pricing control, bundling, and integrated payment channel management (Wallets/Telecom). 
                                    Real-time tracking of funnel conversion.
                                </p>
                            </div>

                            {/* Acquisition */}
                            <div className="bento md:col-span-3 p-8 md:p-12 rounded-[3rem] border-dgo-red/20">
                                <span className="text-3xl mb-8 block">🚀</span>
                                <h3 className="h-strong text-2xl mb-6 uppercase text-dgo-red">Acquisition</h3>
                                <p className="text-gray-400 text-sm font-light leading-relaxed">
                                    Performance marketing lead. The <strong className="text-white">Early Bird Season Pass</strong> launched exclusively 
                                    via DGO as the primary transaction point.
                                </p>
                            </div>

                            {/* UX */}
                            <div className="bento md:col-span-3 p-8 md:p-12 rounded-[3rem]">
                                <span className="text-3xl mb-8 block">✨</span>
                                <h3 className="h-strong text-2xl mb-6 uppercase">Innovation</h3>
                                <p className="text-gray-400 text-sm font-light leading-relaxed">
                                    Introduction of <strong>localized commentary</strong> exclusive to DGO. 
                                    Multi-feed, dual-audio, and fan-driven engagement formats.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* 03. JOINT & HIMALAYA */}
                    <section id="joint" className="py-32 md:py-60 px-6 md:px-24 reveal">
                        <div className="grid lg:grid-cols-2 gap-10 md:gap-20">
                            <div className="p-8 md:p-16 bento rounded-[3rem]">
                                <h2 className="h-strong text-3xl md:text-4xl mb-12">Joint <span className="text-grad">Execution</span></h2>
                                <div className="space-y-6">
                                    {[
                                        "FIFA Brand Governance & Asset Compliance",
                                        "Joint Press Meet & Official Launch Event",
                                        "Shared War Room & Operational Hierarchy",
                                        "Crisis & Incident Communication Protocols",
                                        "Co-branded Match Day Flagship Shows"
                                    ].map((t, i) => (
                                        <div key={i} className="flex items-center gap-6 py-4 border-b border-white/5 group transition-all">
                                            <div className="w-1.5 h-1.5 rounded-full bg-dgo-pink"></div>
                                            <span className="h-strong text-[10px] md:text-[11px] tracking-widest opacity-70">{t}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="p-8 md:p-16 bento rounded-[3rem] border-dgo-red/30 bg-dgo-red/[0.02]">
                                <img src="logo2.png" className="h-8 md:h-10 mb-12" />
                                <h3 className="h-strong text-xl text-dgo-red mb-8 uppercase tracking-widest">Broadcast Coordinated Areas</h3>
                                <ul className="space-y-8 text-gray-400 text-[10px] md:text-[11px] font-bold uppercase tracking-[0.2em] leading-relaxed">
                                    <li>• Primarily lead linear broadcast execution ensuring nationwide reach.</li>
                                    <li>• Driving mass awareness as critical top-of-funnel driver.</li>
                                    <li>• Support partnerships through linear inventory contribution.</li>
                                </ul>
                            </div>
                        </div>
                    </section>

                    {/* 04. GOVERNANCE - FIXED ALIGNMENT */}
                    <section id="governance" className="py-32 md:py-60 px-6 md:px-24 text-center reveal">
                        <h2 className="h-strong text-4xl md:text-7xl mb-20 md:mb-32">Governance <span className="text-gray-700">&</span> Reporting</h2>
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                            {/* Weekly Section */}
                            <div className="p-10 md:p-20 bento rounded-[3rem] flex flex-col items-center justify-center">
                                <h4 className="h-strong text-5xl md:text-7xl mb-4 text-grad">WEEKLY</h4>
                                <div className="text-[10px] font-bold text-gray-500 tracking-[0.4em] mb-8 uppercase text-center">Strategic Alignment Forum</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center">
                                    Revenue performance, subscriber growth, and marketing effectiveness forum.
                                </p>
                            </div>
                            
                            {/* Daily Section */}
                            <div className="p-10 md:p-20 bento rounded-[3rem] flex flex-col items-center justify-center border-white/10">
                                <h4 className="h-strong text-5xl md:text-7xl mb-4 text-grad">DAILY</h4>
                                <div className="text-[10px] font-bold text-gray-500 tracking-[0.4em] mb-8 uppercase text-center">Operational War Room</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center">
                                    Real-time tracking of platform performance, incident logs, and execution status.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="py-40 md:py-80 px-6 text-center reveal">
                        <h2 className="h-mega text-4xl md:text-[9rem] mb-16 leading-none">
                            SHARED VISION.<br />
                            <span className="text-grad italic">UNIVERSAL SUCCESS.</span>
                        </h2>
                        <div className="flex justify-center items-center gap-8 md:gap-16 opacity-40">
                            <img src="logo1.png" className="h-6 md:h-10" />
                            <div className="w-px h-6 bg-white/20"></div>
                            <img src="logo2.png" className="h-6 md:h-10" />
                        </div>
                        <p className="mt-20 text-[9px] text-gray-800 tracking-[1em] font-black uppercase">Consortium Protocol 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
