<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × Himalaya TV | Scope of Work 2026</title>
    
    <!-- Montserrat: The Executive Standard -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Core Tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', magenta: '#d946ef', red: '#ef4444',
                            bg: '#020204', card: 'rgba(255, 255, 255, 0.03)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* LUXURY ANIMATED BACKGROUND */
        body { 
            background-color: #020204; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .aurora-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.4;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(50%, 40%) scale(1.2); }
        }

        /* TEXT STYLING */
        .heading-strong { font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; line-height: 0.85; }
        .text-gradient {
            background: linear-gradient(to right, #8b5cf6, #ec4899, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* BENTO BOXES */
        .bento-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .bento-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ec4899;
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .bento-card.expanded {
            grid-column: span 2;
            border-color: #ec4899;
            background: rgba(236, 72, 145, 0.05);
        }

        /* NAVIGATION overlay */
        .glass-nav {
            background: rgba(2, 2, 4, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- Animated Background Layers -->
    <div class="aurora-container">
        <div class="blob bg-dgo-purple" style="top: -10%; left: -10%;"></div>
        <div class="blob bg-dgo-red" style="bottom: -10%; right: -10%; animation-duration: 15s;"></div>
        <div class="blob bg-dgo-pink" style="top: 40%; left: 30%; animation-duration: 25s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [active, setActive] = useState(null);

            const dgoOwnership = [
                { id: 1, icon: "📡", title: "Digital Broadcasting", span: "md:col-span-2", 
                  details: "DGO assumes full ownership of the digital broadcasting ecosystem, including end-to-end management of OTT streaming infrastructure. The platform will be optimized for adaptive streaming performance, enabling consistent viewing quality across varying bandwidth environments and devices." },
                { id: 2, icon: "💳", title: "Revenue Management", span: "md:col-span-1",
                  details: "Ownership of pricing, bundling strategies, and promotional offers. Management of all payment channels, including wallets, telecom operators, and real-time revenue tracking frameworks with daily KPI visibility." },
                { id: 3, icon: "🔥", title: "Digital Product Differentiation", span: "md:col-span-1",
                  details: "Introduction of Localized Commentary exclusively on DGO. Features include multi-feed/dual-audio capabilities, interactive watch-along experiences, and fan-driven engagement layers to increase platform stickiness." },
                { id: 4, icon: "🏢", title: "Brand Partnerships", span: "md:col-span-2",
                  details: "Lead all B2B-driven subscriber acquisition. Structuring partner-led bundles with telecom operators, ISPs, and digital wallets to drive large-scale user acquisition through distribution integrations." },

                  details: "Creation of digital-first formats: match highlights (exclusive to DGO), short-form social content, behind-the-scenes coverage, and native storytelling tailored for online consumption." },

                        <div className="flex items-center gap-4">
                            <img src="logo.png" className="h-10 w-auto" onError={(e) => e.target.style.display='none'} />

                            <span className="heading-strong text-xl">Himalaya TV</span>
                        </div>
                        <div className="hidden lg:flex gap-10 font-bold text-[10px] uppercase tracking-[0.4em] text-gray-400">

                            <a href="#ownership" className="hover:text-dgo-pink">Ownership</a>
                            <a href="#joint" className="hover:text-dgo-pink">Joint Ops</a>
                            <a href="#governance" className="hover:text-dgo-pink">Reporting</a>

                    </nav>

                    {/* HERO SECTION */}
                    <header className="min-h-screen flex flex-col justify-center px-10 md:px-24">
                        <div className="max-w-6xl">
                            <h1 className="heading-strong text-[5rem] md:text-[10rem] mb-8">
                                <span className="block text-white">Scope of</span>
                                <span className="block text-gradient">Work</span>
                            </h1>
                            <div className="flex flex-col md:flex-row gap-8 items-start md:items-center">
                                <div className="px-8 py-3 bg-dgo-pink/20 border border-dgo-pink/50 rounded-full">
                                    <span className="text-[10px] font-black uppercase tracking-[0.5em] text-dgo-pink">FIFA World Cup 2026 — Nepal</span>
                                </div>
                                <p className="text-gray-400 text-lg md:text-2xl font-light uppercase tracking-[0.2em]">One Product. Dual Platform.</p>
                            </div>
                        </div>
                    </header>

                    <section id="principles" className="py-40 px-10 md:px-24 border-t border-white/5 bg-white/[0.01]">

                            <div className="sticky top-40">
                                <h2 className="heading-strong text-5xl mb-6">01. Guiding<br /><span className="text-gradient">Principles</span></h2>
                                <p className="text-gray-400 text-lg leading-relaxed max-w-md">Clearly aligned commercial objectives and success metrics across both parties to drive total revenue potential.</p>
                            </div>
                            <div className="space-y-12">
                                {[
                                    { title: "Joint Partnership", desc: "Clearly aligned commercial objectives and success metrics across both parties." },
                                    { title: "Strategic Delineation", desc: "Clear ownership across workstreams to ensure operational efficiency and joint accountability for revenue performance." },

                                    <div key={i} className="group">
                                        <h3 className="heading-strong text-2xl mb-4 group-hover:text-dgo-pink transition-colors">{item.title}</h3>
                                        <p className="text-gray-400 leading-relaxed font-light">{item.desc}</p>
                                        <div className="h-[1px] w-full bg-white/10 mt-8 group-hover:bg-dgo-pink transition-all"></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 02 DGO BENTO GRID */}
                    <section id="ownership" className="py-40 px-10 md:px-24">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-20 gap-6">
                            <div>
                                <h2 className="heading-strong text-6xl mb-4">02. DGO <span className="text-gradient">Scope</span></h2>
                                <p className="text-gray-500 uppercase tracking-[0.5em] text-[10px] font-bold">Core Ownership Areas</p>
                            </div>

                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-auto">
                            {dgoOwnership.map((item) => (
                                <div 
                                    key={item.id} 
                                    className={`bento-card p-12 flex flex-col justify-between ${item.span} ${active === item.id ? 'expanded border-dgo-pink shadow-[0_0_50px_rgba(236,72,153,0.1)]' : ''}`}
                                    onClick={() => setActive(active === item.id ? null : item.id)}
                                >
                                    <div>
                                        <div className="text-5xl mb-10">{item.icon}</div>
                                        <h3 className="heading-strong text-3xl mb-6 tracking-tight">{item.title}</h3>
                                        <p className={`text-gray-400 text-sm leading-relaxed transition-all duration-700 ${active === item.id ? 'opacity-100 max-h-[500px]' : 'opacity-60 line-clamp-2'}`}>
                                            {item.details}
                                        </p>
                                    </div>
                                    {active === item.id && (
                                        <div className="mt-10 pt-10 border-t border-white/10 flex gap-4">
                                            <div className="px-4 py-1 rounded-full bg-dgo-pink text-white text-[9px] font-black uppercase tracking-widest">Digital Lead</div>
                                            <div className="px-4 py-1 rounded-full bg-white/10 text-gray-400 text-[9px] font-black uppercase tracking-widest">SOW v1.0</div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 03 JOINT OPS */}
                    <section id="joint" className="py-40 px-10 md:px-24 bg-white/[0.02] border-y border-white/5">
                        <div className="grid lg:grid-cols-2 gap-20 items-center">
                            <div className="p-16 bento-card border-dgo-red/20 bg-dgo-red/5">
                                <h3 className="heading-strong text-4xl mb-10 text-dgo-red">Himalaya TV <br />Coordinated Areas</h3>
                                <ul className="space-y-8 text-gray-400">
                                    <li className="flex gap-6 items-start">
                                        <span className="text-dgo-red font-black">01.</span>
                                        <p className="text-sm leading-relaxed font-light"><strong className="text-white block mb-2 uppercase tracking-widest">Linear Leadership</strong> Primarily lead the linear broadcast execution, ensuring high-quality nationwide reach.</p>
                                    </li>
                                    <li className="flex gap-6 items-start">
                                        <span className="text-dgo-red font-black">02.</span>
                                        <p className="text-sm leading-relaxed font-light"><strong className="text-white block mb-2 uppercase tracking-widest">Top-of-Funnel awareness</strong> Driving mass awareness and audience reach for the overall ecosystem.</p>
                                    </li>
                                    <li className="flex gap-6 items-start">
                                        <span className="text-dgo-red font-black">03.</span>
                                        <p className="text-sm leading-relaxed font-light"><strong className="text-white block mb-2 uppercase tracking-widest">Integrated Sponsorship</strong> Support brand partnerships through linear inventory and joint content initiatives.</p>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="heading-strong text-5xl mb-12 italic leading-none tracking-tighter uppercase">03. Joint <br /><span className="text-gradient">Responsibility</span></h2>
                                <div className="grid gap-4">
                                    {[
                                        "Compliance with FIFA brand guidelines",
                                        "Joint Press Meet and Official Launch Events",
                                        "Shared War Room and Live Operations Structure",
                                        "Crisis and incident communication protocols",
                                        "Co-created Match Day Flagship Shows",
                                        "Major partner integrations requiring cross-platform execution"
                                    ].map((text, i) => (
                                        <div key={i} className="flex items-center gap-6 p-6 bento-card rounded-3xl hover:border-dgo-pink transition-all">
                                            <div className="w-2 h-2 rounded-full bg-dgo-pink shadow-[0_0_15px_#ec4899]" />
                                            <span className="heading-strong text-[11px] tracking-widest">{text}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 04 GOVERNANCE */}
                    <section id="governance" className="py-40 px-10 md:px-24">
                        <div className="max-w-5xl mx-auto glass-card border border-white/10 rounded-[4rem] p-16 md:p-24 text-center">
                            <h2 className="heading-strong text-5xl md:text-7xl mb-16">04. Reporting <span className="text-gradient">& Governance</span></h2>
                            <div className="grid md:grid-cols-2 gap-16">
                                <div>
                                    <h4 className="heading-strong text-4xl mb-4 text-dgo-pink uppercase">Weekly</h4>
                                    <div className="text-[10px] font-black uppercase text-gray-500 tracking-[0.4em] mb-8">Strategic review cadence</div>
                                    <p className="text-gray-400 text-xs leading-loose italic uppercase tracking-wider">Revenue performance, subscriber growth, and marketing effectiveness forum.</p>
                                </div>
                                <div className="border-l border-white/5 hidden md:block" />
                                <div>
                                    <h4 className="heading-strong text-4xl mb-4 text-dgo-pink uppercase">Daily</h4>
                                    <div className="text-[10px] font-black uppercase text-gray-500 tracking-[0.4em] mb-8">Operational War Room</div>
                                    <p className="text-gray-400 text-xs leading-loose italic uppercase tracking-wider">Real-time tracking of platform performance, incident logs, and execution status.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CLOSING */}
                    <footer className="py-60 px-10 text-center relative overflow-hidden">
                        <h2 className="heading-strong text-5xl md:text-[8rem] mb-12">
                            ONE <span className="text-gradient italic">PRODUCT</span><br />
                            SHARED <span className="text-white italic">SUCCESS</span>
                        </h2>
                        <p className="text-gray-500 uppercase tracking-[0.6em] text-[10px] font-black mb-20">FIFA World Cup 2026 Strategy Execution</p>
                        <div className="flex justify-center items-center gap-12 opacity-50 grayscale hover:grayscale-0 transition-all">
                            <img src="logo.png" className="h-10" />
                            <div className="w-[2px] h-6 bg-white/20" />
                            <span className="heading-strong text-lg tracking-widest text-white">Himalaya TV</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
