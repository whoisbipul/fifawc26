<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO × HIMALAYA | SCOPE OF WORK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            canvas: '#030305'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030305; color: #ffffff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* LIVING LIQUID BACKGROUND */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; background: #030305;
        }
        .blob {
            position: absolute; width: 800px; height: 800px;
            background: radial-gradient(circle, var(--color) 0%, transparent 70%);
            mix-blend-mode: screen; opacity: 0.15;
            animation: move-blob 25s infinite alternate ease-in-out;
        }
        @keyframes move-blob {
            0% { transform: translate(-20%, -20%) scale(1); }
            50% { transform: translate(30%, 20%) scale(1.1); }
            100% { transform: translate(-10%, 40%) scale(0.9); }
        }

        /* TEXT SYSTEM */
        .h-mega { font-weight: 900; letter-spacing: -0.07em; text-transform: uppercase; line-height: 0.8; }
        .h-strong { font-weight: 900; letter-spacing: -0.02em; text-transform: uppercase; }
        .text-grad { 
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #ef4444); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* BENTO & GLASS */
        .bento {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #ec4899;
            transform: translateY(-10px);
        }

        /* KINETIC REVEAL */
        .reveal { opacity: 0; transform: translateY(60px) scale(0.98); filter: blur(10px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }

        /* BRUTALIST GRID LINES */
        .grid-line { position: absolute; background: rgba(255,255,255,0.03); z-index: -1; }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob" style="--color: #8b5cf6; top: -10%; left: -10%;"></div>
        <div class="blob" style="--color: #ec4899; bottom: -20%; right: -10%; animation-delay: -5s;"></div>
        <div class="blob" style="--color: #ef4444; top: 40%; left: 30%; animation-delay: -10s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.15 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="relative">
                    {/* NAVIGATION */}
                    <nav className="fixed top-0 w-full z-[100] px-10 py-8 flex justify-between items-center backdrop-blur-xl border-b border-white/5">
                        <div className="flex items-center gap-6">
                            <img src="logo1.png" className="h-10 w-auto" alt="DGO" />
                            <div className="w-px h-6 bg-white/20"></div>
                            <img src="logo2.png" className="h-10 w-auto" alt="Himalaya" />
                        </div>
                        <div className="hidden lg:flex gap-12 font-bold text-[10px] uppercase tracking-[0.5em] text-gray-500">
                            <a href="#principles" className="hover:text-dgo-pink transition-all underline-offset-8 hover:underline">01. Principles</a>
                            <a href="#ownership" className="hover:text-dgo-pink transition-all underline-offset-8 hover:underline">02. Ownership</a>
                            <a href="#joint" className="hover:text-dgo-pink transition-all underline-offset-8 hover:underline">03. Joint</a>
                            <a href="#governance" className="hover:text-dgo-pink transition-all underline-offset-8 hover:underline">04. Reporting</a>
                        </div>
                    </nav>

                    {/* CINEMATIC HERO */}
                    <header className="min-h-screen flex flex-col justify-center px-10 md:px-32 relative">
                        <div className="reveal max-w-7xl">
                            <h1 className="h-mega text-[5.5rem] md:text-[13rem]">
                                <span className="block text-white">SCOPE OF</span>
                                <span className="block text-grad">WORK</span>
                            </h1>
                            <div className="flex items-center gap-10 mt-20">
                                <div className="h-px w-32 bg-dgo-pink"></div>
                                <p className="text-gray-400 text-lg md:text-3xl font-light uppercase tracking-[0.3em]">
                                    FIFA World Cup 2026 — <span className="text-white font-black">Nepal</span>
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* 01. GUIDING PRINCIPLES */}
                    <section id="principles" className="py-60 px-10 md:px-32 border-t border-white/5 reveal">
                        <div className="grid lg:grid-cols-12 gap-20">
                            <div className="lg:col-span-4">
                                <h2 className="h-strong text-5xl mb-8">01. <br /><span className="text-grad">Principles</span></h2>
                                <p className="text-gray-500 text-sm uppercase tracking-widest leading-loose font-bold italic">Operational Anchor: "One Product, Dual Platform"</p>
                            </div>
                            <div className="lg:col-span-8 grid md:grid-cols-2 gap-10">
                                {[
                                    { t: "Commercial Alignment", d: "Clearly aligned commercial objectives and success metrics across both parties to ensure total revenue potential." },
                                    { t: "Joint Accountability", d: "Ownership is delineated, but both parties remain jointly accountable for growth, performance, and market impact." },
                                    { t: "FIFA Compliance", d: "Decisions guided by three core priorities: revenue, consumer experience, and full compliance with FIFA rights." },
                                    { t: "Consortium Synergy", d: "A coordinated approach across all initiatives to ensure consistency and avoid campaign overlap." }
                                ].map((item, i) => (
                                    <div key={i} className="p-10 bento rounded-3xl group">
                                        <h4 className="h-strong text-sm text-dgo-pink mb-6 tracking-[0.3em] group-hover:translate-x-2 transition-transform">{item.t}</h4>
                                        <p className="text-gray-400 text-xs leading-relaxed uppercase font-semibold">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 02. DGO BENTO GRID */}
                    <section id="ownership" className="py-60 px-10 md:px-32 bg-white/[0.01]">
                        <div className="flex justify-between items-end mb-32 reveal">
                            <div>
                                <h2 className="h-mega text-8xl md:text-9xl text-grad opacity-10">CORE</h2>
                                <h2 className="h-strong text-6xl md:text-8xl mt-[-50px]">DGO <span className="text-grad">Ownership</span></h2>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-6 gap-8 reveal">
                            {/* Card 1: OTT Lead */}
                            <div className="bento md:col-span-4 p-16 rounded-[3rem] border-dgo-pink/20 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-12 opacity-10 text-9xl font-black">2.1</div>
                                <span className="text-4xl mb-12 block">🌐</span>
                                <h3 className="h-strong text-4xl mb-6">Digital Broadcasting</h3>
                                <p className="text-gray-400 text-lg leading-relaxed max-w-2xl font-light">
                                    Full ownership of the digital broadcasting ecosystem and OTT infrastructure. 
                                    Adaptive streaming performance enabled for consistent viewing quality across all 
                                    bandwidth environments. Structured incident response for uninterrupted tournament service.
                                </p>
                            </div>

                            {/* Card 2: Revenue */}
                            <div className="bento md:col-span-2 p-12 rounded-[3rem]">
                                <span className="text-4xl mb-12 block">💰</span>
                                <h3 className="h-strong text-xl mb-6 uppercase">Revenue & Subscriptions</h3>
                                <p className="text-gray-500 text-[11px] leading-loose font-bold uppercase tracking-wider">
                                    Full pricing control, bundling strategies, and integration of all payment channels 
                                    including wallets and telecom operators. Real-time visibility into conversion funnels.
                                </p>
                            </div>

                            {/* Card 3: Partnerships */}
                            <div className="bento md:col-span-3 p-12 rounded-[3rem]">
                                <span className="text-4xl mb-12 block">🤝</span>
                                <h3 className="h-strong text-2xl mb-6 text-dgo-pink">Brand Partnerships</h3>
                                <p className="text-gray-400 text-sm leading-relaxed">
                                    Leading all monetization with primary focus on B2B subscriber acquisition. 
                                    Strategic partnership models for Telecoms, ISPs, and Digital Wallets.
                                </p>
                            </div>

                            {/* Card 4: UX Innovation */}
                            <div className="bento md:col-span-3 p-12 rounded-[3rem] border-dgo-purple/20">
                                <span className="text-4xl mb-12 block">✨</span>
                                <h3 className="h-strong text-2xl mb-6 uppercase">Digital Differentiation</h3>
                                <p className="text-gray-400 text-sm leading-relaxed">
                                    Introduction of <strong>localized commentary</strong> exclusive to DGO. Multi-feed viewing, 
                                    dual-audio, and fan-driven engagement formats (watch-alongs) for platform stickiness.
                                </p>
                            </div>

                            {/* Card 5: GTM Strategy */}
                            <div className="bento md:col-span-6 p-16 rounded-[4rem] border-dgo-red/20 bg-dgo-red/[0.02]">
                                <div className="grid lg:grid-cols-2 gap-16 items-center">
                                    <div>
                                        <span className="text-4xl mb-8 block">🚀</span>
                                        <h3 className="h-strong text-4xl mb-6 uppercase tracking-tighter">Customer Acquisition</h3>
                                        <p className="text-gray-300 text-lg font-light leading-relaxed">
                                            Performance marketing lead. The <strong className="text-white underline underline-offset-8">Early Bird Season Pass</strong> will 
                                            be exclusively launched through DGO, followed by corporate bundling for enterprises in urban markets.
                                        </p>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="p-6 bg-white/5 rounded-2xl border border-white/5 font-bold uppercase text-[10px] tracking-widest text-dgo-red italic italic-none">Funnel Ownership</div>
                                        <div className="p-6 bg-white/5 rounded-2xl border border-white/5 font-bold uppercase text-[10px] tracking-widest text-dgo-red italic italic-none">Corporate Bundling</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 03. JOINT & HIMALAYA */}
                    <section id="joint" className="py-60 px-10 md:px-32 reveal">
                        <div className="grid lg:grid-cols-2 gap-20">
                            <div className="p-16 bento rounded-[3rem]">
                                <h2 className="h-strong text-4xl mb-16 uppercase">Joint <span className="text-grad">Execution</span></h2>
                                <div className="space-y-8">
                                    {[
                                        "FIFA Compliance & Brand Governance",
                                        "Joint Press Meet & Official Launch Event",
                                        "Shared War Room & Live Operational Monitoring",
                                        "Crisis & Incident Communication Protocols",
                                        "Co-branded Match Day Flagship Shows"
                                    ].map((t, i) => (
                                        <div key={i} className="flex items-center gap-8 py-4 border-b border-white/5 group hover:pl-6 transition-all">
                                            <div className="w-2 h-2 rounded-full bg-dgo-pink group-hover:scale-150 transition-all"></div>
                                            <span className="h-strong text-[11px] tracking-widest opacity-70 group-hover:opacity-100">{t}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="p-16 bento rounded-[3rem] border-dgo-red/30 bg-dgo-red/[0.03]">
                                <div className="flex gap-6 items-center mb-16">
                                    <img src="logo2.png" className="h-10 opacity-90" />
                                    <h2 className="h-strong text-2xl text-dgo-red uppercase tracking-widest italic-none">Himalaya TV Support</h2>
                                </div>
                                <ul className="space-y-12 text-gray-400 text-[11px] font-black uppercase tracking-[0.3em] leading-loose">
                                    <li>Primarily lead linear broadcast execution ensuring nationwide reach and high-quality coverage.</li>
                                    <li>Acting as a critical top-of-funnel driver for mass awareness across the ecosystem.</li>
                                    <li>Support brand partnerships through linear inventory and distribution contribution.</li>
                                </ul>
                            </div>
                        </div>
                    </section>

                    {/* 04. GOVERNANCE */}
                    <section id="governance" className="py-60 px-10 md:px-32 text-center reveal">
                        <h2 className="h-mega text-[6rem] md:text-[10rem] text-grad opacity-10 mb-[-60px] tracking-tight">CONTROL</h2>
                        <h2 className="h-strong text-5xl md:text-7xl mb-32">Governance <span className="text-white">& Reporting</span></h2>
                        <div className="max-w-6xl mx-auto bento grid md:grid-cols-2 gap-20 p-24 rounded-[4rem]">
                            <div>
                                <h4 className="h-strong text-7xl mb-4 text-grad">WEEKLY</h4>
                                <div className="text-[10px] font-black text-gray-500 tracking-[0.5em] mb-10 uppercase">Strategic Alignment Forum</div>
                                <p className="text-gray-400 text-xs leading-loose uppercase font-bold italic-none tracking-widest">Revenue performance, subscriber growth, and marketing effectiveness review.</p>
                            </div>
                            <div className="border-l border-white/10 hidden md:block"></div>
                            <div>
                                <h4 className="h-strong text-7xl mb-4 text-grad">DAILY</h4>
                                <div className="text-[10px] font-black text-gray-500 tracking-[0.5em] mb-10 uppercase">Operational War Room</div>
                                <p className="text-gray-400 text-xs leading-loose uppercase font-bold italic-none tracking-widest">Real-time tracking of platform performance, incident logs, and execution status.</p>
                            </div>
                        </div>
                    </section>

                    {/* FINAL FOOTER */}
                    <footer className="py-80 px-10 text-center relative overflow-hidden reveal">
                        <h2 className="h-mega text-6xl md:text-[10rem] mb-20 leading-none">
                            ONE PRODUCT.<br />
                            <span className="text-grad">SHARED AMBITION.</span>
                        </h2>
                        <div className="flex justify-center items-center gap-20 opacity-40 hover:opacity-100 transition-opacity grayscale hover:grayscale-0">
                            <img src="logo1.png" className="h-10 w-auto" />
                            <div className="w-[1px] h-10 bg-white/20"></div>
                            <img src="logo2.png" className="h-10 w-auto" />
                        </div>
                        <p className="mt-32 text-[10px] text-gray-800 tracking-[1.5em] font-black uppercase">Consortium Protocol — 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
