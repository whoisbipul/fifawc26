<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.W. | DGO × HIMALAYA TV 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            canvas: '#08090d'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #08090d; color: #ffffff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; margin: 0; }

        /* THEMATIC BACKGROUND */
        .aura {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.1;
            animation: drift 20s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        .trophy-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vh; height: 70vh; opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url('https://www.fifa.com/static-assets/fifacom-generic-trophy.png');
            background-repeat: no-repeat; background-position: center; background-size: contain;
        }

        .h-mega { font-weight: 900; letter-spacing: -0.06em; text-transform: uppercase; line-height: 0.85; }
        .h-strong { font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; }
        .text-grad { background: linear-gradient(90deg, #8b5cf6, #ec4899, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .bento { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .bento:hover { border-color: #ec4899; transform: translateY(-5px); background: rgba(255, 255, 255, 0.04); }

        /* REVEAL */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* NEW WAR ROOM & TOOLS CSS */
        .station-header { border-left: 4px solid #ec4899; padding-left: 15px; }
        .hud-tool { border-left: 2px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .hud-tool:hover { border-left-color: #ec4899; background: rgba(236, 72, 153, 0.05); }
    </style>
</head>
<body>

    <div class="aura bg-dgo-purple w-[60vw] h-[60vw]" style="top: -10%; right: -10%;"></div>
    <div class="trophy-watermark"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            const warRoomGroups = {
                "Command Center": [
                    { role: "War Room Lead", res: "Overall decision making, escalation", shift: "24/7", rep: "Project Head" },
                    { role: "Shift Supervisor", res: "Manage live ops per shift", shift: "3 shifts", rep: "War Room Lead" }
                ],
                "Broadcast Ops": [
                    { role: "Feed Manager", res: "Handle FIFA incoming feeds", shift: "Live matches", rep: "Supervisor" },
                    { role: "Signal QA", res: "Check video/audio quality", shift: "Live matches", rep: "Feed Manager" }
                ],
                "Tech Station": [
                    { role: "Streaming Engineer", res: "OTT stream delivery", shift: "24/7", rep: "Tech Lead" },
                    { role: "App Monitoring", res: "User experience tracking", shift: "24/7", rep: "Tech Lead" },
                    { role: "Incident Manager", res: "Handle outages", shift: "24/7", rep: "War Room Lead" }
                ],
                "Production & Data": [
                    { role: "Commentary Lead", res: "Manage dual commentary feeds", shift: "Live matches", rep: "Supervisor" },
                    { role: "Highlights Editor", res: "Clip generation", shift: "Post-match", rep: "Content Lead" },
                    { role: "Analytics Manager", res: "Subscriber tracking KPI", shift: "Daily", rep: "Project Head" }
                ],
                "Support Unit": [
                    { role: "Support Lead", res: "User issue resolution", shift: "24/7", rep: "Ops Lead" }
                ]
            };

            const tools = ["Slack", "Monitoring Tools", "IRD Decoder", "Waveform Monitor", "Audio Mixer", "Mic / IFB", "CDN / Encoder", "Analytics Dashboard", "PagerDuty", "Adobe Suite", "BI Tools", "CRM"];

            return (
                <div className="relative w-full overflow-x-hidden">
                    {/* NAVIGATION */}
                    <nav className="fixed top-0 w-full z-[2000] px-6 md:px-12 py-6 flex justify-between items-center bg-dgo-canvas/90 backdrop-blur-2xl border-b border-white/5">
                        <div className="flex items-center gap-4 md:gap-8">
                            <img src="logo1.png" className="h-7 md:h-10 object-contain" />
                            <div className="w-px h-6 bg-white/20"></div>
                            <img src="logo2.png" className="h-7 md:h-10 object-contain" />
                        </div>
                        <div className="hidden lg:flex gap-10 font-bold text-[10px] uppercase tracking-[0.4em] text-gray-400">
                            <a href="#principles" className="hover:text-dgo-pink transition-all">Principles</a>
                            <a href="#ownership" className="hover:text-dgo-pink transition-all">Ownership</a>
                            <a href="#warroom" className="hover:text-dgo-pink transition-all">Command</a>
                            <a href="#governance" className="hover:text-dgo-pink transition-all">Reporting</a>
                        </div>
                    </nav>

                    {/* HERO */}
                    <header className="min-h-screen flex flex-col justify-center px-6 md:px-24">
                        <div className="reveal">
                            <h1 className="h-mega text-6xl md:text-[11rem]">
                                <span className="block text-white uppercase">Scope of</span>
                                <span className="block text-grad italic-none">Work</span>
                            </h1>
                            <div className="flex items-center gap-6 md:gap-12 mt-12 md:mt-20">
                                <div className="h-px w-12 md:w-32 bg-dgo-pink"></div>
                                <p className="text-gray-400 text-sm md:text-3xl font-light uppercase tracking-[0.4em] leading-tight">
                                    FIFA 2026 — <span className="text-white font-black underline decoration-dgo-pink underline-offset-8">NEPAL Consortia</span>
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* 01. PRINCIPLES */}
                    <section id="principles" className="py-32 md:py-60 px-6 md:px-24 reveal border-t border-white/5">
                        <div className="grid lg:grid-cols-12 gap-16">
                            <div className="lg:col-span-5">
                                <h2 className="h-strong text-4xl md:text-6xl mb-10 leading-none">01.<br /><span className="text-grad">Principles</span></h2>
                                <p className="text-gray-500 text-lg md:text-xl font-light leading-relaxed mb-8 uppercase tracking-widest">
                                    Strategic execution anchored on a “One Product, Dual Platform” framework.
                                </p>
                            </div>
                            <div className="lg:col-span-7 grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[
                                    { t: "Commercial Alignment", d: "Aligned objectives and success metrics across both parties." },
                                    { t: "Joint Accountability", d: "Jointly accountable for revenue and market impact." },
                                    { t: "FIFA Compliance", d: "Strict adherence to FIFA rights, brand guidelines, and governance." },
                                    { t: "Coordinated Synergy", d: "Consistency in execution to avoid overlap or conflict." }
                                ].map((item, i) => (
                                    <div key={i} className="p-8 bento rounded-[2rem]">
                                        <h4 className="h-strong text-[11px] text-dgo-pink mb-4 tracking-[0.3em]">{item.t}</h4>
                                        <p className="text-gray-400 text-[11px] leading-relaxed font-bold uppercase tracking-widest">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 02. DGO SCOPE */}
                    <section id="ownership" className="py-32 md:py-60 px-6 md:px-24 bg-white/[0.01]">
                        <div className="mb-24 reveal">
                            <h2 className="h-strong text-5xl md:text-8xl mb-4">DGO <span className="text-grad">Scope</span></h2>
                            <p className="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold">Consortium Lead ownership</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-6 gap-6 reveal">
                            <div className="bento md:col-span-4 p-8 md:p-16 rounded-[3rem] border-dgo-pink/20">
                                <span className="text-3xl mb-8 block">🌐</span>
                                <h3 className="h-strong text-2xl md:text-5xl mb-8 leading-none">Digital Broadcasting</h3>
                                <p className="text-gray-400 text-sm md:text-xl font-light leading-relaxed">
                                    Full ownership of the OTT streaming infrastructure. Optimized for adaptive streaming 
                                    performance and uninterrupted tournament service.
                                </p>
                            </div>
                            <div className="bento md:col-span-2 p-8 md:p-12 rounded-[3rem]">
                                <span className="text-3xl mb-8 block">💰</span>
                                <h3 className="h-strong text-xl mb-6 uppercase">Revenue Ops</h3>
                                <p className="text-gray-500 text-[10px] font-bold leading-relaxed uppercase tracking-widest">
                                    Pricing control, bundling, and payment management. Real-time funnel tracking.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* 03. NEW WAR ROOM DESIGN: STRATEGIC STATIONS */}
                    <section id="warroom" className="py-32 md:py-60 px-6 md:px-24 reveal">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-24 border-b border-white/5 pb-12">
                            <div>
                                <h2 className="h-strong text-4xl md:text-8xl leading-none">WAR ROOM <br /><span className="text-grad">STATIONS</span></h2>
                                <p className="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold mt-4">Command Center Hierarchy</p>
                            </div>
                            <div className="flex items-center gap-4 hidden md:flex">
                                <div className="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                                <span className="text-[10px] font-black uppercase tracking-widest text-gray-500 italic-none">Live Deployment Ready</span>
                            </div>
                        </div>

                        <div className="space-y-20 max-w-7xl mx-auto">
                            {Object.entries(warRoomGroups).map(([dept, roles], idx) => (
                                <div key={idx} className="grid lg:grid-cols-12 gap-10 reveal">
                                    <div className="lg:col-span-4 sticky top-40 h-fit">
                                        <div className="station-header">
                                            <h3 className="h-strong text-3xl mb-2 text-white">{dept}</h3>
                                            <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.4em]">Operations Unit</p>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-8 space-y-4">
                                        {roles.map((role, rIdx) => (
                                            <div key={rIdx} className="bento p-8 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                                <div className="max-w-md">
                                                    <h4 className="h-strong text-xl text-white mb-2">{role.role}</h4>
                                                    <p className="text-gray-500 text-xs font-medium uppercase tracking-wide leading-relaxed">{role.res}</p>
                                                </div>
                                                <div className="flex gap-8 text-right shrink-0">
                                                    <div>
                                                        <span className="block text-[9px] font-black uppercase text-dgo-pink tracking-widest mb-1">Shift</span>
                                                        <span className="h-strong text-xs">{role.shift}</span>
                                                    </div>
                                                    <div>
                                                        <span className="block text-[9px] font-black uppercase text-gray-600 tracking-widest mb-1">Reports To</span>
                                                        <span className="h-strong text-xs">{role.rep}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 04. NEW TOOLS DESIGN: DIGITAL ARSENAL GRID */}
                    <section className="py-32 md:py-60 px-6 md:px-24 bg-white/[0.01] reveal border-t border-white/5">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-20">
                                <h2 className="h-strong text-4xl md:text-6xl text-center md:text-left mb-4 uppercase">DIGITAL <br /><span className="text-grad">ARSENAL</span></h2>
                                <p className="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold text-center md:text-left italic-none">Systems & Tools Integration</p>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-0.5 bg-white/5 border border-white/5">
                                {tools.map((tool, i) => (
                                    <div key={i} className="hud-tool p-8 bg-dgo-canvas flex flex-col justify-between h-40">
                                        <span className="text-[10px] font-black text-gray-700 tracking-widest">0{i+1}</span>
                                        <span className="h-strong text-xs tracking-widest text-white leading-tight uppercase">{tool}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 05. GOVERNANCE */}
                    <section id="governance" className="py-32 md:py-60 px-6 md:px-24 text-center reveal">
                        <h2 className="h-strong text-4xl md:text-8xl mb-24 md:mb-40 tracking-tighter">Reporting <span className="text-gray-800">&</span> Governance</h2>
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16">
                            <div className="p-12 md:p-24 bento rounded-[4rem] flex flex-col items-center justify-center">
                                <h4 className="h-strong text-5xl md:text-8xl mb-6 text-grad leading-none tracking-tighter">WEEKLY</h4>
                                <div className="text-[10px] md:text-[12px] font-black text-gray-500 tracking-[0.6em] mb-12 uppercase">Strategic Alignment Forum</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center max-w-sm">Revenue performance, subscriber growth, and marketing effectiveness review.</p>
                            </div>
                            <div className="p-12 md:p-24 bento rounded-[4rem] flex flex-col items-center justify-center border-white/10">
                                <h4 className="h-strong text-5xl md:text-8xl mb-6 text-grad leading-none tracking-tighter">DAILY</h4>
                                <div className="text-[10px] md:text-[12px] font-black text-gray-500 tracking-[0.6em] mb-12 uppercase">Operational War Room</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center max-w-sm">Real-time tracking of platform performance, incident logs, and execution status.</p>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="py-40 md:py-80 px-6 text-center reveal">
                        <h2 className="h-mega text-5xl md:text-[10rem] mb-16 leading-none">
                            SHARED VISION.<br />
                            <span className="text-grad italic-none">UNIVERSAL SUCCESS.</span>
                        </h2>
                        <div className="flex justify-center items-center gap-10 md:gap-20 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all">
                            <img src="logo1.png" className="h-8 md:h-12" />
                            <div className="w-[1px] h-10 bg-white/20"></div>
                            <img src="logo2.png" className="h-8 md:h-12" />
                        </div>
                        <p className="mt-24 text-[10px] text-gray-800 tracking-[1.5em] font-black uppercase">Consortium Protocol — 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
