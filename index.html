<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.W. | DGO × HIMALAYA TV 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dgo: {
                            purple: '#8b5cf6', pink: '#ec4899', red: '#ef4444',
                            canvas: '#08090d'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #08090d; color: #ffffff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; margin: 0; }

        /* THEMATIC WATERMARK */
        .aura {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.1;
            animation: drift 20s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        .trophy-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vh; height: 70vh; opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url('https://www.fifa.com/static-assets/fifacom-generic-trophy.png');
            background-repeat: no-repeat; background-position: center; background-size: contain;
        }

        /* TEXT SYSTEM */
        .h-mega { font-weight: 900; letter-spacing: -0.06em; text-transform: uppercase; line-height: 0.85; }
        .h-strong { font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; }
        .text-grad { 
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #ef4444); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* BENTO SYSTEM */
        .bento {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento:hover {
            border-color: #ec4899;
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.04);
        }

        /* REVEAL */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .h-mega { font-size: 3.5rem !important; }
        }
    </style>
</head>
<body>

    <div class="aura bg-dgo-purple w-[60vw] h-[60vw]" style="top: -10%; right: -10%;"></div>
    <div class="trophy-watermark"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            const warRoom = [
                { dep: "Command Center", role: "War Room Lead", res: "Overall decision making, escalation", shift: "24/7", rep: "Project Head" },
                { dep: "Command Center", role: "Shift Supervisor", res: "Manage live ops per shift", shift: "3 shifts", rep: "War Room Lead" },
                { dep: "Broadcast Ops", role: "Feed Manager", res: "Handle FIFA incoming feeds", shift: "Live matches", rep: "Supervisor" },

                { dep: "Data", role: "Analytics Manager", res: "Subscriber tracking KPI", shift: "Daily", rep: "Project Head" },

                        <div className="flex items-center gap-4 md:gap-8">

                            <a href="#principles" className="hover:text-dgo-pink transition-all">Principles</a>
                            <a href="#ownership" className="hover:text-dgo-pink transition-all">DGO Scope</a>
                            <a href="#warroom" className="hover:text-dgo-pink transition-all">War Room</a>
                            <a href="#governance" className="hover:text-dgo-pink transition-all">Governance</a>

                    </nav>

                    {/* HERO */}

                            <h1 className="h-mega text-6xl md:text-[11rem]">
                                <span className="block text-white">Scope of</span>
                                <span className="block text-grad">Work</span>
                            </h1>
                            <div className="flex items-center gap-6 md:gap-12 mt-12 md:mt-20">
                                <div className="h-px w-12 md:w-32 bg-dgo-pink"></div>
                                <p className="text-gray-400 text-sm md:text-3xl font-light uppercase tracking-[0.4em] leading-tight">

                                </p>
                            </div>
                        </div>

                    {/* 01. PRINCIPLES */}

                                <h2 className="h-strong text-4xl md:text-6xl mb-10 leading-none">01.<br /><span className="text-grad italic-none">Principles</span></h2>

                                    Strategic execution anchored on a “One Product, Dual Platform” framework.

                            </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                            </div>
                            <div className="bento md:col-span-2 p-8 md:p-12 rounded-[3rem]">

                                <h3 className="h-strong text-xl mb-6 uppercase">Revenue Ops</h3>
                                <p className="text-gray-500 text-[10px] font-bold leading-relaxed uppercase tracking-widest">
                                    Full pricing control, bundling, and integrated payment channel management. Real-time funnel tracking.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* 03. WAR ROOM STRUCTURE (NEW PDF CONTENT) */}
                    <section id="warroom" className="py-32 md:py-60 px-6 md:px-24 reveal">
                        <div className="mb-20 text-center md:text-left">
                            <h2 className="h-strong text-4xl md:text-7xl mb-4 italic-none">War Room <span className="text-grad">Structure</span></h2>
                            <p className="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold italic-none">Operational Command & Personnel Hierarchy</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {warRoom.map((item, i) => (
                                <div key={i} className="bento p-8 rounded-3xl group">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="px-3 py-1 rounded-full bg-dgo-pink/10 border border-dgo-pink/20 text-dgo-pink text-[9px] font-black uppercase tracking-widest">{item.dep}</div>
                                        <div className="text-[9px] font-bold text-gray-600 uppercase tracking-widest">{item.shift}</div>
                                    </div>
                                    <h4 className="h-strong text-xl mb-2 text-white group-hover:text-dgo-pink transition-colors">{item.role}</h4>
                                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-6">Reports to: {item.rep}</p>
                                    <div className="h-px w-full bg-white/5 mb-6"></div>
                                    <p className="text-gray-400 text-xs leading-relaxed font-medium uppercase tracking-wide">{item.res}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 04. TOOLS & SYSTEMS (NEW PDF CONTENT) */}
                    <section className="py-32 md:py-60 px-6 md:px-24 bg-white/[0.01] reveal">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="h-strong text-3xl md:text-6xl mb-16 uppercase tracking-tighter">Digital <span className="text-grad">Arsenal</span></h2>
                            <div className="flex flex-wrap justify-center gap-4">
                                {tools.map((tool, i) => (
                                    <div key={i} className="px-8 py-4 bento rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] hover:text-dgo-pink transition-colors border-white/5">
                                        {tool}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 05. GOVERNANCE */}
                    <section id="governance" className="py-32 md:py-60 px-6 md:px-24 text-center reveal">
                        <h2 className="h-strong text-4xl md:text-8xl mb-24 md:mb-40 tracking-tighter">Reporting <span className="text-gray-700">&</span> Governance</h2>
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16">
                            <div className="p-12 md:p-24 bento rounded-[4rem] flex flex-col items-center justify-center">
                                <h4 className="h-strong text-5xl md:text-8xl mb-6 text-grad leading-none tracking-tighter">WEEKLY</h4>
                                <div className="text-[10px] md:text-[12px] font-black text-gray-500 tracking-[0.6em] mb-12 uppercase">Strategic Alignment Forum</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center max-w-sm">Revenue performance, subscriber growth, and marketing effectiveness review.</p>
                            </div>
                            <div className="p-12 md:p-24 bento rounded-[4rem] flex flex-col items-center justify-center border-white/10">
                                <h4 className="h-strong text-5xl md:text-8xl mb-6 text-grad leading-none tracking-tighter">DAILY</h4>
                                <div className="text-[10px] md:text-[12px] font-black text-gray-500 tracking-[0.6em] mb-12 uppercase">Operational War Room</div>
                                <p className="text-gray-400 text-[11px] leading-relaxed uppercase font-bold tracking-widest text-center max-w-sm">Real-time tracking of platform performance, incident logs, and execution status.</p>

                        </div>
                    </section>

                    {/* FOOTER */}

                        <h2 className="h-mega text-5xl md:text-[10rem] mb-16 leading-none">
                            SHARED VISION.<br />
                            <span className="text-grad italic-none">UNIVERSAL SUCCESS.</span>
                        </h2>
                        <div className="flex justify-center items-center gap-10 md:gap-20 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all">
                            <img src="logo1.png" className="h-8 md:h-12" />
                            <div className="w-[1px] h-10 bg-white/20"></div>
                            <img src="logo2.png" className="h-8 md:h-12" />
                        </div>
                        <p className="mt-24 text-[10px] text-gray-800 tracking-[1.5em] font-black uppercase">Consortium Protocol — 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
